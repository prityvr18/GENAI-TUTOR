<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="GenAI Tutor - a beginner-friendly AI learning platform" />
  <title>GenAI Tutor</title>
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/pages.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header" role="banner">
    <h1 class="brand"><img src="./assets/icons/genai-logo.svg" alt="" class="brand-logo" /> GenAI Tutor</h1>
    <nav id="main-nav" aria-label="Primary navigation">
      <a href="#/" data-route-link>Home</a>
      <a href="#/tutor" data-route-link>Tutor</a>
      <a href="#/modules" data-route-link>Modules</a>
      <a href="#/quiz" data-route-link>Quiz</a>
      <a href="#/dashboard" data-route-link>Dashboard</a>
      <a href="#/settings" data-route-link>Settings</a>
    </nav>
  </header>

  <main id="main-content" tabindex="-1">
    <section id="route-landing" data-route="/" aria-labelledby="landing-title">
      <h2 id="landing-title">Welcome</h2>
      <div id="landing-root"></div>
    </section>

    <section id="route-tutor" data-route="/tutor" aria-labelledby="tutor-title">
      <h2 id="tutor-title">AI Tutor Chat</h2>
      <div id="tutor-root"></div>
    </section>

    <section id="route-modules" data-route="/modules" aria-labelledby="modules-title">
      <h2 id="modules-title">Learning Modules</h2>
      <div id="modules-root"></div>
    </section>

    <section id="route-quiz" data-route="/quiz" aria-labelledby="quiz-title">
      <h2 id="quiz-title">Quiz Practice</h2>
      <div id="quiz-root"></div>
    </section>

    <section id="route-dashboard" data-route="/dashboard" aria-labelledby="dashboard-title">
      <h2 id="dashboard-title">Progress Dashboard</h2>
      <div id="dashboard-root"></div>
    </section>

    <section id="route-settings" data-route="/settings" aria-labelledby="settings-title">
      <h2 id="settings-title">Settings</h2>
      <div id="settings-root"></div>
    </section>
  </main>

  <aside id="announcer" class="sr-only" aria-live="polite" aria-atomic="true"></aside>

  <noscript>
    <section class="no-js-note" aria-label="No JavaScript fallback">
      <p>
        JavaScript is disabled. You can still read all learning modules and page content below.
        Interactive tutor chat, quizzes, and saved progress require JavaScript.
      </p>
    </section>
  </noscript>

  <script defer src="./js/utils.js"></script>
  <script defer src="./js/store.js"></script>
  <script defer src="./js/router.js"></script>

  <script defer src="./js/services/ai-service.js"></script>
  <script defer src="./js/services/quiz-service.js"></script>
  <script defer src="./js/services/progress-service.js"></script>
  <script defer src="./js/services/session-service.js"></script>

  <script defer src="./js/components/card.js"></script>
  <script defer src="./js/components/nav.js"></script>
  <script defer src="./js/components/chat.js"></script>
  <script defer src="./js/components/topic-browser.js"></script>
  <script defer src="./js/components/quiz.js"></script>
  <script defer src="./js/components/progress.js"></script>
  <script defer src="./js/components/subject-selector.js"></script>
  <script defer src="./js/components/session-list.js"></script>

  <script defer src="./js/pages/landing.js"></script>
  <script defer src="./js/pages/tutor.js"></script>
  <script defer src="./js/pages/modules.js"></script>
  <script defer src="./js/pages/quiz.js"></script>
  <script defer src="./js/pages/dashboard.js"></script>
  <script defer src="./js/pages/settings.js"></script>

  <script defer src="./js/app.js"></script>
</body>
</html>
